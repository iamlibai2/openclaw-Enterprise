[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认命令行选项
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    api: API 测试

# 最小版本
minversion = 7.0

# 异步支持
asyncio_mode = auto